name: Build & Publish LabControl

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore src/LabControl/LabControl.csproj

      - name: Build (Debug)
        run: dotnet build src/LabControl/LabControl.csproj --no-restore --configuration Debug

  publish:
    name: Publish Windows EXE
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained EXE (win-x64)
        run: |
          dotnet publish src/LabControl/LabControl.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output publish/win-x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabControl-win-x64
          path: publish/win-x64/LabControl.exe
          if-no-files-found: error
